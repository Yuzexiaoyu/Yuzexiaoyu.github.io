mainSections   = ["post"]
rssFullContent = true
favicon        = "image/avatar.webp"

[params.search]
  enable = true
  resultCount = 10

[footer]
    since = 2026

[sidebar]
    subtitle = ""
    avatar   = "image/avatar.webp"

[article]
  math = false

[article.license]
  enabled = true
  default = "转载请注明出处"

[article.mermaid]
  transparentBackground = false
  lightTheme          = "default"
  darkTheme           = "dark"
  securityLevel       = "strict"
  look                = "classic"
  htmlLabels          = true

[[widgets.homepage]]
    type = "search"

[[widgets.page]]
    type = "toc"

[comments]
enabled = true
provider = "giscus"

[comments.giscus]
repo = "Yuzexiaoyu/Yuzexiaoyu.github.io"
repoID = "R_kgDORU00mA"
category = "Announcements"
categoryID = "DIC_kwDORU00mM4C4In1"
mapping = "pathname"
strict = "0"
reactionsEnabled = "0"
emitMetadata = "0"
inputPosition = "top"
lightTheme = "noborder_dark"
darkTheme = "noborder_dark"
lang = "zh-CN"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true

[dateFormat]
  published = "2006-01-02" 
  lastUpdated = "2006-01-02"

[colorScheme]
  enable = true
  toggle = false  # 关闭暗色模式切换按钮
  default = "dark" 
