{{- $opts := dict "minify" hugo.IsProduction -}}
{{- $script := resources.Get "ts/main.ts" | js.Build $opts | fingerprint -}}

<script type="text/javascript" src="{{ $script.RelPermalink }}" defer></script>

{{- with resources.Get "ts/custom.ts" -}}
    {{- $customScript := . | js.Build $opts | fingerprint -}}
    <script type="text/javascript" src="{{ $customScript.RelPermalink }}" defer></script>
{{- end -}}

<!-- ==========================================
     🚀 swup.js 配置
     ========================================== -->
<script src="/lib/Swup.umd.js"></script>

<script>
  let swupReady = false;
  document.addEventListener('click', function(e) {
    if (swupReady) return;
    const link = e.target.closest('a[href]:not([target="_blank"]):not([rel="external"])');
    if (link && link.origin === window.location.origin) {
      e.preventDefault();
      const checkSwup = setInterval(() => {
        if (swupReady) {
          clearInterval(checkSwup);
          swup.navigate(link.href);
        }
      }, 50);
    }
  }, true);

  let swup;

  window.addEventListener('load', function() {
    if (typeof Swup === 'undefined') return;

    console.log('🚀 [Swup] 启动...');

    swup = new Swup({
      containers: ['body'],
      animationDuration: 0
    });

    swupReady = true;

    swup.hooks.on('link:click', (visit) => {
      console.log('🔗 [Swup] 点击链接:', visit.to.url);
    });

    swup.hooks.on('page:view', () => {
      console.log('✅ [Swup] 无刷新切换成功');
      
      window.dispatchEvent(new Event('scroll'));
      window.dispatchEvent(new Event('resize'));
      window.dispatchEvent(new Event('load'));
    });

    console.log('✅ [Swup] 初始化完成');
  });





// 原生JS版曲速引擎，完全仿照原版效果，不用任何外部文件
(function() {
  if (window.__warpBg) return;

  // 创建canvas
  const canvas = document.createElement('canvas');
  canvas.id = 'warp-canvas';
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;';
  document.documentElement.insertBefore(canvas, document.body);
  
  const ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];
  const particleCount = 512; // 和原版一样的粒子数

  class Particle {
    constructor() {
      // 初始位置，中心附近
      this.x = Math.random() * width - width/2;
      this.y = Math.random() * height - height/2;
      this.z = Math.random() * width;
      this.pz = this.z;
    }
    update(speed) {
      this.z -= speed;
      // 碰到前面就重置
      if(this.z < 1) {
        this.z = width;
        this.x = Math.random() * width - width/2;
        this.y = Math.random() * height - height/2;
        this.pz = this.z;
      }
    }
    draw() {
      // 计算投影，和原版一模一样
      const sx = this.x / this.z * width + width/2;
      const sy = this.y / this.z * height + height/2;
      const px = this.x / this.pz * width + width/2;
      const py = this.y / this.pz * height + height/2;
      
      // 画线，和原版的线一模一样
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(sx, sy);
      // 透明度，越远越暗
      ctx.strokeStyle = `rgba(100, 150, 255, ${1 - this.z/width})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      
      this.pz = this.z;
    }
  }

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }

  function animate() {
    // 半透明清空，做拖影，和原版一模一样
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0,0,width,height);
    
    for(let i=0;i<particles.length;i++) {
      particles[i].update(0.5); // 速度和原版一样
      particles[i].draw();
    }
    
    requestAnimationFrame(animate);
  }

  function init() {
    resize();
    particles = [];
    for(let i=0;i<particleCount;i++) {
      particles.push(new Particle());
    }
    animate();
    window.__warpBg = true;
  }

  window.addEventListener('resize', resize);
  init();
})();











</script>
