<!-- 播放器容器 -->
<div id="aplayer"></div>

<!-- APlayer 脚本（defer 异步加载，initPlayer 轮询等库就绪） -->
<script src="/lib/aplayer/APlayer.min.js" defer></script>

<script>
(function() {
  if (window.aplayerInstance) return;
  
  function initPlayer() {
    if (window.aplayerInstance) return;
    // APlayer.min.js 已加 defer，轮询等库就绪
    if (typeof APlayer === 'undefined') {
      setTimeout(initPlayer, 50);
      return;
    }

    var ap = new APlayer({
      container: document.getElementById('aplayer'),
      mini: false,
      autoplay: false,
      loop: 'all',
      order: 'list',
      preload: 'none',
      volume: 0.7,
      mutex: true,
      lrcType: 0,
      audio: [
        {{- range $i, $track := .Site.Data.music.playlist }}
        {
          name: '{{ $track.name }}',
          artist: '{{ $track.artist }}',
          url: '{{ $track.url }}',
          cover: '{{ $track.cover }}',
          theme: '{{ $track.theme }}'
        }{{ if ne (add $i 1) (len $.Site.Data.music.playlist) }},{{ end }}
        {{- end }}
      ]
    });
    
    ap.list.audios.forEach(function(audio, index) {
      var pic = document.querySelectorAll('.aplayer-pic')[index];
      if (pic && audio.cover) {
        pic.style.backgroundImage = "url('" + audio.cover + "')";
      }
    });
    
    var list = document.querySelector('.aplayer-list');
    if (list) {
      list.classList.remove('show');
      list.classList.add('aplayer-list-hide');
      list.style.overflowY = 'overlay';
      list.style.overflowX = 'hidden';
    }
    
    var listOl = document.querySelector('.aplayer-list ol');
    if (listOl) {
      listOl.style.overflowY = 'visible';
      listOl.style.maxHeight = 'none';
    }
    
    var isListVisible = false;
    function hideList() {
      list.classList.remove('show');
      list.classList.add('aplayer-list-hide');
      isListVisible = false;
    }
    function showList() {
      list.classList.add('show');
      list.classList.remove('aplayer-list-hide');
      isListVisible = true;
    }

    // 点击歌单内歌曲 → 切歌 + 收起列表（与迷你播放器行为一致）
    list.addEventListener('click', function(e) {
      var li = e.target.closest('li');
      if (li) hideList();
    });

    var listBtn = document.querySelector('.aplayer-icon-lrc');
    if (listBtn && list) {
      var newBtn = listBtn.cloneNode(true);
      listBtn.parentNode.replaceChild(newBtn, listBtn);

      newBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (isListVisible) {
          hideList();
        } else {
          showList();
        }
      });
    }
    
    var player = document.getElementById('aplayer');
    if (player) {
      document.documentElement.appendChild(player);
    }
    
    window.aplayerInstance = ap;
  }
  
  // 立即初始化播放器 UI（封面图等立即加载），但音频预加载先关闭。
  // 等预加载链全部完成后由 __enableAudioPreload 切换到 metadata，
  // 避免与封面图预加载抢带宽。
  initPlayer();

  var __audioPreloadEnabled = false;
  window.__enableAudioPreload = function() {
    if (__audioPreloadEnabled) return;
    __audioPreloadEnabled = true;
    var ap = window.aplayerInstance;
    if (!ap || !ap.audio) return;
    ap.audio.preload = 'metadata';
    // 若正在播放则不 load()，否则会重置 audio 元素打断播放
    if (!ap.audio.paused) return;
    try { ap.audio.load(); } catch(e) {}
  };
})();
</script>
