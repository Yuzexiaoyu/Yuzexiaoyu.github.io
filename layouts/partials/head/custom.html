<link rel="stylesheet" href="/lib/aplayer/APlayer.min.css">

<!-- 🔥 页面加载动画（故障风格，必须播放完一次） -->
<div id="page-loader" class="loading">
  <div class="loader">
    <div data-glitch="Yuzexiaoyu.space" class="glitch">Yuzexiaoyu.space</div>
  </div>
</div>

<style>
/* 加载动画容器 */
.loading {
  position: fixed;
  display: flex;
  justify-content: center;
  align-items: center;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 999999;
  background-color: #000;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.loading.hidden {
  opacity: 0;
  visibility: hidden;
}

/* 加载动画居中 */
.loader {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* From Uiverse.io by andrew-demchenk0 */ 
.glitch {
  position: relative;
  font-size: 45px;
  font-weight: 700;
  line-height: 1.2;
  color: #fff;
  letter-spacing: 5px;
  z-index: 1;
  animation: shift 1s ease-in-out infinite alternate;
  font-family: "Poppins", sans-serif;
}

.glitch:before,
.glitch:after {
  display: block;
  content: attr(data-glitch);
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0.8;
}

.glitch:before {
  animation: glitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
  color: #8b00ff;
  z-index: -1;
}

.glitch:after {
  animation: glitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite;
  color: #00e571;
  z-index: -2;
}

@keyframes glitch {
  0% {
    transform: translate(0);
  }

  20% {
    transform: translate(-3px, 3px);
  }

  40% {
    transform: translate(-3px, -3px);
  }

  60% {
    transform: translate(3px, 3px);
  }

  80% {
    transform: translate(3px, -3px);
  }

  to {
    transform: translate(0);
  }
}

@keyframes shift {
  0%, 40%, 44%, 58%, 61%, 65%, 69%, 73%, 100% {
    transform: skewX(0deg);
  }

  41% {
    transform: skewX(10deg);
  }

  42% {
    transform: skewX(-10deg);
  }

  59% {
    transform: skewX(40deg) skewY(10deg);
  }

  60% {
    transform: skewX(-40deg) skewY(-10deg);
  }

  63% {
    transform: skewX(10deg) skewY(-5deg);
  }

  70% {
    transform: skewX(-50deg) skewY(-20deg);
  }

  71% {
    transform: skewX(10deg) skewY(-10deg);
  }
}
</style>

<script>
(function() {
  var pageLoader = document.getElementById('page-loader');
  var minDisplayTime = 1500;  
  var pageLoaded = false;
  var animationComplete = false;
  
  if (!window.__pageLoaderShown) {
    window.__pageLoaderShown = true;
    
    window.addEventListener('load', function() {
      pageLoaded = true;
      checkHideLoader();
    });
    
    setTimeout(function() {
      animationComplete = true;
      checkHideLoader();
    }, minDisplayTime);
    
    window.checkHideLoader = function() {
      if (pageLoaded && animationComplete) {
        hidePageLoader();
      }
    };
    
    window.hidePageLoader = function() {
      if (pageLoader) {
        pageLoader.classList.add('hidden');
        setTimeout(function() {
          pageLoader.style.display = 'none';
        }, 300);
      }
    };
  } else {
    pageLoader.style.display = 'none';
  }
})();
</script>
