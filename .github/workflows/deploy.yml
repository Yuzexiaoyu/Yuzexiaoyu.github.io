name: Deploy Site with R2 CDN

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install beautifulsoup4

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Build Hugo Site
        run: hugo --minify --gc

      - name: Upload Media Files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 sync public/ s3://$BUCKET/ \
            --endpoint-url $ENDPOINT \
            --acl public-read \
            --exclude "*" \
            --include "*.jpg" --include "*.jpeg" --include "*.png" \
            --include "*.gif" --include "*.webp" --include "*.svg" \
            --include "*.bmp" --include "*.ico" \
            --include "*.mp3" --include "*.wav" --include "*.ogg" --include "*.m4a" \
            --include "*.mp4" --include "*.webm" --include "*.mov" --include "*.avi" \
            --include "*.pdf" --include "*.zip" \
            --include "*.flac" \  # 关键：支持Flac音乐格式
            --delete || echo "⚠️ R2 upload failed (continuing deployment...)"

      - name: Replace Media Links with R2 CDN
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          python scripts/replace-media-links.py public "$R2_PUBLIC_URL" || echo "⚠️ Link replacement failed (continuing deployment...)"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Remove Media Files from GitHub Repository
        run: |
          # 配置Git用户信息
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 拉取最新代码避免冲突
          git pull origin master --rebase || true
          
          # 删除文章内媒体文件（缓存）
          git rm -r --cached "content/post/**/*.jpg" "content/post/**/*.jpeg" "content/post/**/*.png" \
            "content/post/**/*.gif" "content/post/**/*.mp4" "content/post/**/*.mp3" "content/post/**/*.pdf" 2>/dev/null || true
          
          # 删除music目录下所有文件（缓存）
          git rm -r --cached "static/music/**/*" 2>/dev/null || true
          
          # 仅当有变更时提交
          if [[ `git status --porcelain` ]]; then
            git commit -m "chore: remove media files (keep local, use R2 CDN)"
            git push origin master
          else
            echo "ℹ️ No media files to remove from repository"
          fi
