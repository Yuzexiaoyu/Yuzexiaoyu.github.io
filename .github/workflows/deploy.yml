name: Deploy Site with R2 CDN

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # 🔥 强制使用 Node.js 24 运行 Actions（解决弃用警告）
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # v5 存在兼容问题，使用稳定的 v4 + Node24 兼容
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v5  # v6 暂未广泛支持，使用稳定的 v5 + Node24 兼容
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3  # v4 暂未发布，使用稳定的 v3 + Node24 兼容
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Build site
        run: hugo --minify --gc

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 sync public/ s3://$BUCKET/ \
            --endpoint-url $ENDPOINT \
            --acl public-read \
            --exclude "*" \
            --include "*.jpg" --include "*.jpeg" --include "*.png" \
            --include "*.gif" --include "*.webp" --include "*.svg" \
            --include "*.bmp" --include "*.ico" \
            --include "*.mp3" --include "*.wav" --include "*.ogg" --include "*.m4a" \
            --include "*.mp4" --include "*.webm" --include "*.mov" --include "*.avi" \
            --include "*.pdf" --include "*.zip" \
            --delete || echo "R2 upload failed (continuing...)"

      - name: Replace media links
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python scripts/replace-media-links.py public "$R2_PUBLIC_URL" || echo "Link replacement failed (continuing...)"

      - name: Setup Pages
        uses: actions/configure-pages@v5  # v6 暂未发布，使用稳定的 v5 + Node24 兼容

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # 最新稳定版，无需修改
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4  # v5 暂未发布，使用稳定的 v4 + Node24 兼容

      # ✅ 删除云端媒体文件
      - name: Delete media files from GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 删除 content/post/ 下的所有媒体文件
          git rm -r --cached "content/post/**/*.jpg" 2>/dev/null || true
          git rm -r --cached "content/post/**/*.jpeg" 2>/dev/null || true
          git rm -r --cached "content/post/**/*.png" 2>/dev/null || true
          git rm -r --cached "content/post/**/*.gif" 2>/dev/null || true
          git rm -r --cached "content/post/**/*.mp4" 2>/dev/null || true
          git rm -r --cached "content/post/**/*.mp3" 2>/dev/null || true
          git rm -r --cached "content/post/**/*.pdf" 2>/dev/null || true
          
          # 删除 static/music/ 下的所有媒体文件
          git rm -r --cached "static/music/*.jpg" 2>/dev/null || true
          git rm -r --cached "static/music/*.jpeg" 2>/dev/null || true
          git rm -r --cached "static/music/*.png" 2>/dev/null || true
          git rm -r --cached "static/music/*.gif" 2>/dev/null || true
          git rm -r --cached "static/music/*.mp4" 2>/dev/null || true
          git rm -r --cached "static/music/*.mp3" 2>/dev/null || true
          git rm -r --cached "static/music/*.pdf" 2>/dev/null || true
          
          # 提交并推送
          git commit -m "chore: 删除云端媒体文件（保留本地）" || echo "No media files to delete"
          git push origin master
